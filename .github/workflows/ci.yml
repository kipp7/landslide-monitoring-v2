name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  desktop-ui:
    name: Desktop UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build UI
        run: npm run build

      - name: Build edge services
        run: npm run edge:build

      - name: Lint edge services
        run: npm run edge:lint

      - name: Test edge risk isolation
        run: |
          npm test -w @lsmv2/edge-risk-model
          npm test -w @lsmv2/hermes-edge-supervisor

      - name: Test server edge AI integration
        run: |
          npm run lint -w @lsmv2/ai-prediction-worker
          npm test -w @lsmv2/ai-prediction-worker
          npm test -w @lsmv2/api-service

  windows-shell:
    name: Windows Shell
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Windows host
        run: dotnet restore .\apps\windows-shell\LandslideDesk.Win\LandslideDesk.Win.csproj

      - name: Build Windows host
        run: dotnet build .\apps\windows-shell\LandslideDesk.Win\LandslideDesk.Win.csproj -c Release --no-restore
