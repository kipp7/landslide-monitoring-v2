<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .bg { fill: #fcfcf8; }
      .box { fill: #ffffff; stroke: #222; stroke-width: 2; }
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #111; }
      .subtitle { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #333; }
      .txt { font: 16px 'Consolas', 'Courier New', monospace; fill: #111; }
      .small { font: 14px 'Consolas', 'Courier New', monospace; fill: #222; }
      .pin { stroke: #222; stroke-width: 2; }
      .wire3v3 { stroke: #c62828; stroke-width: 4; fill: none; }
      .wire5v { stroke: #ef6c00; stroke-width: 4; fill: none; }
      .wiregnd { stroke: #37474f; stroke-width: 4; fill: none; }
      .wiresig { stroke: #1565c0; stroke-width: 3; fill: none; }
      .wirei2c { stroke: #2e7d32; stroke-width: 3; fill: none; }
      .node3v3 { fill: #c62828; }
      .node5v { fill: #ef6c00; }
      .nodegnd { fill: #37474f; }
      .nodesig { fill: #1565c0; }
      .nodei2c { fill: #2e7d32; }
      .note { font: 15px 'Segoe UI', Arial, sans-serif; fill: #333; }
      .warn { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #8d1b1b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1200"/>
  <text class="title" x="40" y="45">RK2206 V1 Carrier Schematic</text>
  <text class="subtitle" x="40" y="78">Power split: 5V_SYS for GPS + RK2206 board input, 3V3_SYS for XL01/SHT30/MPU6050</text>

  <!-- Power input -->
  <rect class="box" x="70" y="180" width="210" height="170" rx="6"/>
  <text class="subtitle" x="115" y="210">J_PWR</text>
  <text class="txt" x="95" y="245">1  5V_SYS</text>
  <text class="txt" x="95" y="280">2  3V3_SYS</text>
  <text class="txt" x="95" y="315">3  GND</text>
  <line class="pin" x1="280" y1="240" x2="330" y2="240"/>
  <line class="pin" x1="280" y1="275" x2="330" y2="275"/>
  <line class="pin" x1="280" y1="310" x2="330" y2="310"/>
  <text class="small" x="85" y="338">DC module outputs:</text>
  <text class="small" x="85" y="356">5V / 3.3V / GND</text>

  <!-- RK2206 logical header -->
  <rect class="box" x="650" y="150" width="320" height="420" rx="6"/>
  <text class="subtitle" x="725" y="182">P_RK2206</text>
  <text class="small" x="705" y="205">logical carrier connection only</text>
  <text class="txt" x="695" y="245">1  5V_IN</text>
  <text class="txt" x="695" y="285">2  GND</text>
  <text class="txt" x="695" y="325">3  PB2</text>
  <text class="txt" x="695" y="365">4  PB3</text>
  <text class="txt" x="695" y="405">5  PB4</text>
  <text class="txt" x="695" y="445">6  PB5</text>
  <text class="txt" x="695" y="485">7  PB6</text>
  <text class="txt" x="695" y="525">8  PB7</text>
  <line class="pin" x1="650" y1="240" x2="600" y2="240"/>
  <line class="pin" x1="650" y1="280" x2="600" y2="280"/>
  <line class="pin" x1="650" y1="320" x2="600" y2="320"/>
  <line class="pin" x1="650" y1="360" x2="600" y2="360"/>
  <line class="pin" x1="650" y1="400" x2="600" y2="400"/>
  <line class="pin" x1="650" y1="440" x2="600" y2="440"/>
  <line class="pin" x1="650" y1="480" x2="600" y2="480"/>
  <line class="pin" x1="650" y1="520" x2="600" y2="520"/>

  <!-- XL01 -->
  <rect class="box" x="1240" y="140" width="220" height="170" rx="6"/>
  <text class="subtitle" x="1310" y="170">J_XL01</text>
  <text class="txt" x="1265" y="205">1  3V3_SYS</text>
  <text class="txt" x="1265" y="240">2  GND</text>
  <text class="txt" x="1265" y="275">3  XL01_TX</text>
  <text class="txt" x="1265" y="310">4  XL01_RX</text>
  <line class="pin" x1="1240" y1="200" x2="1190" y2="200"/>
  <line class="pin" x1="1240" y1="235" x2="1190" y2="235"/>
  <line class="pin" x1="1240" y1="270" x2="1190" y2="270"/>
  <line class="pin" x1="1240" y1="305" x2="1190" y2="305"/>

  <!-- GPS -->
  <rect class="box" x="1240" y="420" width="220" height="170" rx="6"/>
  <text class="subtitle" x="1325" y="450">J_GPS</text>
  <text class="txt" x="1265" y="485">1  5V_SYS</text>
  <text class="txt" x="1265" y="520">2  GND</text>
  <text class="txt" x="1265" y="555">3  GPS_TX</text>
  <text class="txt" x="1265" y="590">4  GPS_RX</text>
  <line class="pin" x1="1240" y1="480" x2="1190" y2="480"/>
  <line class="pin" x1="1240" y1="515" x2="1190" y2="515"/>
  <line class="pin" x1="1240" y1="550" x2="1190" y2="550"/>
  <line class="pin" x1="1240" y1="585" x2="1190" y2="585"/>

  <!-- SHT30 -->
  <rect class="box" x="1240" y="770" width="220" height="170" rx="6"/>
  <text class="subtitle" x="1315" y="800">J_SHT30</text>
  <text class="txt" x="1265" y="835">1  3V3_SYS</text>
  <text class="txt" x="1265" y="870">2  GND</text>
  <text class="txt" x="1265" y="905">3  I2C_SDA</text>
  <text class="txt" x="1265" y="940">4  I2C_SCL</text>
  <line class="pin" x1="1240" y1="830" x2="1190" y2="830"/>
  <line class="pin" x1="1240" y1="865" x2="1190" y2="865"/>
  <line class="pin" x1="1240" y1="900" x2="1190" y2="900"/>
  <line class="pin" x1="1240" y1="935" x2="1190" y2="935"/>

  <!-- MPU -->
  <rect class="box" x="1240" y="985" width="220" height="170" rx="6"/>
  <text class="subtitle" x="1322" y="1015">J_MPU</text>
  <text class="txt" x="1265" y="1050">1  3V3_SYS</text>
  <text class="txt" x="1265" y="1085">2  GND</text>
  <text class="txt" x="1265" y="1120">3  I2C_SDA</text>
  <text class="txt" x="1265" y="1155">4  I2C_SCL</text>
  <line class="pin" x1="1240" y1="1045" x2="1190" y2="1045"/>
  <line class="pin" x1="1240" y1="1080" x2="1190" y2="1080"/>
  <line class="pin" x1="1240" y1="1115" x2="1190" y2="1115"/>
  <line class="pin" x1="1240" y1="1150" x2="1190" y2="1150"/>

  <!-- power decoupling -->
  <rect class="box" x="310" y="510" width="220" height="240" rx="6"/>
  <text class="subtitle" x="350" y="540">Power + Pull-ups</text>
  <text class="txt" x="335" y="585">C3 100nF  5V_SYS-GND</text>
  <text class="txt" x="335" y="620">C4 10uF   5V_SYS-GND</text>
  <text class="txt" x="335" y="670">C1 100nF  3V3_SYS-GND</text>
  <text class="txt" x="335" y="705">C2 10uF   3V3_SYS-GND</text>
  <text class="txt" x="335" y="740">R1 4.7k   SDA to 3V3</text>
  <text class="txt" x="335" y="775">R2 4.7k   SCL to 3V3</text>

  <!-- GPS protection -->
  <rect class="box" x="1010" y="435" width="170" height="220" rx="6"/>
  <text class="subtitle" x="1045" y="465">GPS Level Safe</text>
  <text class="txt" x="1040" y="510">R3 10k</text>
  <text class="txt" x="1040" y="555">R4 20k</text>
  <text class="txt" x="1040" y="600">R5 1k</text>
  <text class="small" x="1032" y="632">R3/R4: 5V TX divider</text>

  <!-- Notes -->
  <rect class="box" x="70" y="820" width="530" height="260" rx="6"/>
  <text class="subtitle" x="95" y="850">Schematic Notes</text>
  <text class="note" x="95" y="885">1. GPS power is 5V_SYS per latest hardware truth.</text>
  <text class="note" x="95" y="915">2. XL01 / SHT30 / MPU6050 all stay in 3V3_SYS domain.</text>
  <text class="note" x="95" y="945">3. PB2/PB3/PB4/PB5/PB6/PB7 are frozen and must not move.</text>
  <text class="note" x="95" y="975">4. RK2206 board input is shown as 5V_IN logical point only.</text>
  <text class="warn" x="95" y="1015">Do not short 5V_SYS and 3V3_SYS together.</text>
  <text class="note" x="95" y="1045">If GPS TX is later proven 3.3V-safe, R3 may be 0R and R4 DNP.</text>
  <text class="warn" x="95" y="1075">Verify GPS_RX accepts 3.3V UART high, or add TX level shift.</text>

  <!-- 5V bus -->
  <path class="wire5v" d="M330 240 H540 V240 H600"/>
  <circle class="node5v" cx="330" cy="240" r="5"/>
  <circle class="node5v" cx="540" cy="240" r="5"/>
  <circle class="node5v" cx="600" cy="240" r="5"/>
  <text class="small" x="355" y="230">5V_SYS</text>

  <path class="wire5v" d="M540 240 V480 H1190"/>
  <circle class="node5v" cx="540" cy="480" r="5"/>
  <circle class="node5v" cx="1190" cy="480" r="5"/>

  <path class="wire5v" d="M540 240 V560 H310"/>
  <circle class="node5v" cx="540" cy="560" r="5"/>
  <circle class="node5v" cx="310" cy="560" r="5"/>

  <!-- 3v3 bus -->
  <path class="wire3v3" d="M330 275 H500 V200 H1190"/>
  <circle class="node3v3" cx="330" cy="275" r="5"/>
  <circle class="node3v3" cx="500" cy="275" r="5"/>
  <circle class="node3v3" cx="500" cy="200" r="5"/>
  <circle class="node3v3" cx="1190" cy="200" r="5"/>
  <text class="small" x="355" y="266">3V3_SYS</text>

  <path class="wire3v3" d="M500 200 V830 H1190"/>
  <circle class="node3v3" cx="500" cy="830" r="5"/>
  <circle class="node3v3" cx="1190" cy="830" r="5"/>

  <path class="wire3v3" d="M500 200 V1045 H1190"/>
  <circle class="node3v3" cx="500" cy="1045" r="5"/>
  <circle class="node3v3" cx="1190" cy="1045" r="5"/>

  <path class="wire3v3" d="M500 200 V650 H310"/>
  <circle class="node3v3" cx="500" cy="650" r="5"/>
  <circle class="node3v3" cx="310" cy="650" r="5"/>

  <!-- GND bus -->
  <path class="wiregnd" d="M330 310 H560 V280 H600"/>
  <circle class="nodegnd" cx="330" cy="310" r="5"/>
  <circle class="nodegnd" cx="560" cy="310" r="5"/>
  <circle class="nodegnd" cx="600" cy="280" r="5"/>
  <text class="small" x="355" y="303">GND</text>

  <path class="wiregnd" d="M560 310 V235 H1190"/>
  <circle class="nodegnd" cx="1190" cy="235" r="5"/>
  <path class="wiregnd" d="M560 310 V515 H1190"/>
  <circle class="nodegnd" cx="1190" cy="515" r="5"/>
  <path class="wiregnd" d="M560 310 V865 H1190"/>
  <circle class="nodegnd" cx="1190" cy="865" r="5"/>
  <path class="wiregnd" d="M560 310 V1080 H1190"/>
  <circle class="nodegnd" cx="1190" cy="1080" r="5"/>
  <path class="wiregnd" d="M560 310 V585 H310"/>
  <circle class="nodegnd" cx="310" cy="585" r="5"/>
  <path class="wiregnd" d="M560 310 V685 H310"/>
  <circle class="nodegnd" cx="310" cy="685" r="5"/>

  <!-- XL01 signals -->
  <path class="wiresig" d="M600 320 H1110 V270 H1190"/>
  <path class="wiresig" d="M600 360 H1080 V305 H1190"/>
  <circle class="nodesig" cx="600" cy="320" r="5"/>
  <circle class="nodesig" cx="1190" cy="270" r="5"/>
  <circle class="nodesig" cx="600" cy="360" r="5"/>
  <circle class="nodesig" cx="1190" cy="305" r="5"/>
  <text class="small" x="880" y="258">PB2 <- XL01_TX</text>
  <text class="small" x="860" y="344">PB3 -> XL01_RX</text>

  <!-- I2C -->
  <path class="wirei2c" d="M600 400 H920 V900 H1190"/>
  <path class="wirei2c" d="M920 900 V1115 H1190"/>
  <path class="wirei2c" d="M600 440 H950 V935 H1190"/>
  <path class="wirei2c" d="M950 935 V1150 H1190"/>
  <circle class="nodei2c" cx="600" cy="400" r="5"/>
  <circle class="nodei2c" cx="920" cy="900" r="5"/>
  <circle class="nodei2c" cx="1190" cy="900" r="5"/>
  <circle class="nodei2c" cx="1190" cy="1115" r="5"/>
  <circle class="nodei2c" cx="600" cy="440" r="5"/>
  <circle class="nodei2c" cx="950" cy="935" r="5"/>
  <circle class="nodei2c" cx="1190" cy="935" r="5"/>
  <circle class="nodei2c" cx="1190" cy="1150" r="5"/>
  <text class="small" x="815" y="888">I2C_SDA (PB4)</text>
  <text class="small" x="842" y="923">I2C_SCL (PB5)</text>

  <path class="wirei2c" d="M920 900 H430 V740"/>
  <path class="wirei2c" d="M950 935 H470 V775"/>
  <circle class="nodei2c" cx="430" cy="740" r="5"/>
  <circle class="nodei2c" cx="470" cy="775" r="5"/>
  <path class="wire3v3" d="M430 740 H430 V650"/>
  <path class="wire3v3" d="M470 775 H470 V650"/>
  <circle class="node3v3" cx="430" cy="650" r="5"/>
  <circle class="node3v3" cx="470" cy="650" r="5"/>

  <!-- GPS signals with protection -->
  <path class="wiresig" d="M1190 550 H1150"/>
  <path class="wiresig" d="M1150 550 H1095"/>
  <path class="wiresig" d="M1095 550 H1095 V510 H1060"/>
  <path class="wiresig" d="M1110 510 H1150 V510 H1150 V480 H600"/>
  <circle class="nodesig" cx="1190" cy="550" r="5"/>
  <circle class="nodesig" cx="1095" cy="550" r="5"/>
  <circle class="nodesig" cx="1150" cy="510" r="5"/>
  <circle class="nodesig" cx="600" cy="480" r="5"/>
  <text class="small" x="1115" y="500">GPS_TX -> R3 -> PB6</text>

  <path class="wiregnd" d="M1150 510 V555 H1060"/>
  <path class="wiregnd" d="M1110 555 H1110 V700"/>
  <path class="wiregnd" d="M1110 700 H560"/>
  <circle class="nodegnd" cx="1110" cy="700" r="5"/>
  <circle class="nodegnd" cx="1150" cy="510" r="5"/>

  <path class="wiresig" d="M600 520 H1030 V600 H1060"/>
  <path class="wiresig" d="M1110 600 H1150 V585 H1190"/>
  <circle class="nodesig" cx="600" cy="520" r="5"/>
  <circle class="nodesig" cx="1190" cy="585" r="5"/>
  <text class="small" x="915" y="590">PB7 -> R5 -> GPS_RX</text>

  <!-- resistor labels -->
  <text class="small" x="1068" y="512">R3</text>
  <text class="small" x="1068" y="557">R4</text>
  <text class="small" x="1068" y="602">R5</text>
</svg>
