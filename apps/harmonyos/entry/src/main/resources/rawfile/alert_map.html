<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>监测地图</title>
  <link rel="stylesheet" href="leaflet.css">
  <style>
    :root {
      --surface: #eef2f0;
      --surface-raised: #ffffff;
      --text: #18212b;
      --muted: #56616c;
      --border: #d7dfdb;
      --danger: #b44832;
      --shadow-control: 0 4px 14px rgba(24, 33, 43, 0.16);
      --space-sm: 8px;
      --space-md: 12px;
      --details-reserved: 0px;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--surface);
    }

    #map {
      width: 100%;
      height: calc(100% - var(--details-reserved));
      background: var(--surface);
    }

    body {
      color: var(--text);
      font-family: "HarmonyOS Sans SC", "Noto Sans SC", sans-serif;
    }

    .leaflet-container {
      position: relative;
      overflow: hidden;
      background: var(--surface);
      font-family: inherit;
    }

    .leaflet-pane,
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow,
    .leaflet-tile-container,
    .leaflet-pane > svg,
    .leaflet-pane > canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .leaflet-pane { z-index: 400; }
    .leaflet-tile-pane { z-index: 200; }
    .leaflet-overlay-pane { z-index: 400; }
    .leaflet-shadow-pane { z-index: 500; }
    .leaflet-marker-pane { z-index: 600; }
    .leaflet-tooltip-pane { z-index: 650; }
    .leaflet-popup-pane { z-index: 700; }

    .leaflet-tile {
      visibility: hidden;
      user-select: none;
      -webkit-user-drag: none;
    }

    .leaflet-tile-loaded {
      visibility: inherit;
    }

    .leaflet-zoom-animated {
      transform-origin: 0 0;
    }

    .leaflet-container.leaflet-touch-drag {
      touch-action: pinch-zoom;
    }

    .leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
      touch-action: none;
    }

    .map-zoom {
      position: absolute;
      z-index: 1001;
      top: var(--space-md);
      left: var(--space-md);
      display: flex;
      overflow: hidden;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface-raised);
      box-shadow: var(--shadow-control);
    }

    .map-zoom button {
      width: 44px;
      height: 44px;
      padding: 0;
      border: 0;
      color: var(--text);
      background: var(--surface-raised);
      font-family: inherit;
      font-size: 22px;
      line-height: 44px;
    }

    .map-zoom button + button {
      border-top: 1px solid var(--border);
    }

    .map-zoom button:active {
      background: #e8eeeb;
    }

    .map-zoom button:focus-visible {
      outline: 2px solid #477b96;
      outline-offset: -3px;
    }

    .alert-marker {
      position: relative;
      width: 24px;
      height: 24px;
    }

    .alert-marker__pulse,
    .alert-marker__pulse::after {
      position: absolute;
      inset: 0;
      content: "";
      border: 2px solid var(--danger);
      border-radius: 50%;
      opacity: 0;
      animation: alert-pulse 2.4s cubic-bezier(0.2, 0.7, 0.3, 1) infinite;
    }

    .alert-marker__pulse::after {
      animation-delay: 1.2s;
    }

    .alert-marker__core {
      position: absolute;
      top: 7px;
      left: 7px;
      width: 10px;
      height: 10px;
      border: 2px solid var(--surface-raised);
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 2px 8px rgba(109, 42, 30, 0.42);
    }

    .user-marker {
      position: relative;
      width: 28px;
      height: 28px;
    }

    .user-marker__ring {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(55, 123, 177, 0.58);
      border-radius: 50%;
      background: rgba(55, 123, 177, 0.18);
    }

    .user-marker__core {
      position: absolute;
      inset: 7px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: #377bb1;
      box-shadow: 0 2px 9px rgba(23, 69, 106, 0.42);
    }

    .safe-marker {
      display: grid;
      width: 30px;
      height: 30px;
      place-items: center;
      border: 3px solid #ffffff;
      border-radius: 50%;
      color: #ffffff;
      background: #27856d;
      box-shadow: 0 3px 10px rgba(24, 81, 66, 0.42);
      font-size: 15px;
      font-weight: 700;
    }

    .node-marker {
      --node-color: #3c9d82;
      --node-delay: 0s;
      position: relative;
      width: 34px;
      height: 34px;
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }

    .node-marker--alert { --node-color: var(--danger); }

    .node-marker__pulse,
    .node-marker__pulse::after {
      position: absolute;
      inset: 3px;
      content: "";
      border: 2px solid var(--node-color);
      border-radius: 50%;
      background: rgba(60, 157, 130, 0.14);
      box-shadow: 0 0 10px rgba(60, 157, 130, 0.24);
      opacity: 0.72;
      animation: node-pulse 2.8s cubic-bezier(0.2, 0.7, 0.3, 1) infinite;
      animation-delay: var(--node-delay);
    }

    .node-marker--alert .node-marker__pulse,
    .node-marker--alert .node-marker__pulse::after {
      background: rgba(180, 72, 50, 0.14);
      box-shadow: 0 0 10px rgba(180, 72, 50, 0.26);
    }

    .node-marker__pulse::after {
      inset: -2px;
      animation-delay: calc(var(--node-delay) + 1.4s);
    }

    .node-marker__core {
      position: absolute;
      inset: 3px;
      display: grid;
      place-items: center;
      border: 2px solid #ffffff;
      border-radius: 50%;
      background: var(--node-color);
      box-shadow: 0 0 0 5px rgba(60, 157, 130, 0.22), 0 3px 10px rgba(24, 33, 43, 0.34);
    }

    .node-marker--alert .node-marker__core {
      box-shadow: 0 0 0 5px rgba(180, 72, 50, 0.22), 0 3px 10px rgba(109, 42, 30, 0.38);
    }

    .node-map-tooltip {
      border: 0;
      border-radius: 6px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow-control);
      font-size: 12px;
      line-height: 1.5;
    }

    .node-map-tooltip::before { display: none; }

    .node-map-tooltip__source {
      color: var(--muted);
      font-size: 11px;
    }

    @keyframes alert-pulse {
      0% {
        opacity: 0.72;
        transform: scale(0.55);
      }
      72%,
      100% {
        opacity: 0;
        transform: scale(3.6);
      }
    }

    @keyframes node-pulse {
      0% {
        opacity: 0.76;
        transform: scale(0.72);
      }
      75%,
      100% {
        opacity: 0.08;
        transform: scale(2.5);
      }
    }

    .map-status {
      position: absolute;
      z-index: 1000;
      top: var(--space-md);
      left: 56px;
      right: 68px;
      display: none;
      min-height: 36px;
      align-items: center;
      padding: var(--space-sm) var(--space-md);
      border: 1px solid #ead3cc;
      border-radius: 7px;
      color: #7e3527;
      background: rgba(255, 248, 245, 0.96);
      box-shadow: var(--shadow-control);
      font-size: 12px;
      line-height: 1.5;
    }

    .map-status.is-visible {
      display: flex;
    }

    .map-loading {
      position: absolute;
      z-index: 999;
      top: 46%;
      left: 50%;
      padding: var(--space-sm) var(--space-md);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow-control);
      font-size: 12px;
      transform: translate(-50%, -50%);
    }

    .map-loading.is-hidden {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .alert-marker__pulse,
      .alert-marker__pulse::after,
      .node-marker__pulse,
      .node-marker__pulse::after {
        opacity: 0.45;
        animation: none;
        transform: scale(1.5);
      }
    }
  </style>
</head>
<body>
  <div id="map" role="application" aria-label="监测位置地图"></div>
  <div id="map-loading" class="map-loading" role="status">正在加载天地图卫星影像</div>
  <div id="map-zoom" class="map-zoom" aria-label="地图缩放">
    <button id="zoom-in" type="button" aria-label="放大">+</button>
    <button id="zoom-out" type="button" aria-label="缩小">−</button>
  </div>
  <div id="map-status" class="map-status" role="status">地图底图加载失败，位置标记仍可查看</div>
  <script src="leaflet.js"></script>
  <script>
    (function () {
      'use strict';

      var map = null;
      var alertMarker = null;
      var nodeMarkers = [];
      var userMarker = null;
      var safeMarker = null;
      var guidanceLine = null;
      var pendingMapState = null;
      var pendingTianDiTuKey = '';
      var tianDiTuLayers = [];
      var tileReady = false;
      var tileFailureCount = 0;
      var tileTimeout = null;
      var statusElement = document.getElementById('map-status');
      var loadingElement = document.getElementById('map-loading');
      var zoomElement = document.getElementById('map-zoom');

      function validCoordinate(latitude, longitude) {
        return Number.isFinite(latitude) && Number.isFinite(longitude) &&
          latitude >= -90 && latitude <= 90 && longitude >= -180 && longitude < 180 &&
          !(Math.abs(latitude) < 0.000001 && Math.abs(longitude) < 0.000001);
      }

      function showStatus(message) {
        loadingElement.classList.add('is-hidden');
        statusElement.textContent = message;
        statusElement.classList.add('is-visible');
        document.title = 'map-status';
      }

      function clearTileTimeout() {
        if (tileTimeout !== null) {
          window.clearTimeout(tileTimeout);
          tileTimeout = null;
        }
      }

      function markTileReady() {
        if (!tileReady) {
          tileReady = true;
          clearTileTimeout();
          loadingElement.classList.add('is-hidden');
          statusElement.classList.remove('is-visible');
          document.title = 'map-ready';
        }
      }

      function noteTileFailure() {
        tileFailureCount += 1;
        if (!tileReady && tileFailureCount >= 4) {
          clearTileTimeout();
          showStatus('天地图影像加载失败，位置标记仍可查看');
        }
      }

      function tianDiTuTileUrl(layer, key, coords, zoom, host) {
        return 'https://t' + host + '.tianditu.gov.cn/DataServer?T=' + layer +
          '_w&x=' + coords.x + '&y=' + coords.y + '&l=' + zoom + '&tk=' + encodeURIComponent(key);
      }

      function createTianDiTuLayer(layer, key, options) {
        var TianDiTuLayer = L.TileLayer.extend({
          getTileUrl: function (coords) {
            var host = Math.abs(coords.x + coords.y) % 8;
            var zoom = this._getZoomForUrl();
            return tianDiTuTileUrl(layer, key, coords, zoom, host);
          }
        });
        return new TianDiTuLayer('', options);
      }

      function retryTile(event, tileLayer, layer, key) {
        var retries = Number(event.tile.getAttribute('data-tdt-retries') || '0') + 1;
        if (retries >= 8) {
          noteTileFailure();
          return;
        }
        event.tile.setAttribute('data-tdt-retries', String(retries));
        var firstHost = Math.abs(event.coords.x + event.coords.y) % 8;
        var nextHost = (firstHost + retries) % 8;
        event.tile.src = tianDiTuTileUrl(layer, key, event.coords, tileLayer._getZoomForUrl(), nextHost);
      }

      function loadTianDiTu(key) {
        if (!map) return;
        tianDiTuLayers.forEach(function (layer) { map.removeLayer(layer); });
        tianDiTuLayers = [];
        clearTileTimeout();
        tileReady = false;
        tileFailureCount = 0;
        statusElement.classList.remove('is-visible');
        loadingElement.textContent = '正在加载天地图卫星影像';
        loadingElement.classList.remove('is-hidden');

        if (!key) {
          showStatus('地图服务未配置，位置标记仍可查看');
          return;
        }

        var options = {
          minZoom: 3,
          maxZoom: 18,
          maxNativeZoom: 18,
          updateWhenIdle: true,
          keepBuffer: 3
        };
        var imagery = createTianDiTuLayer('img', key, options);
        var labels = createTianDiTuLayer('cia', key, options);
        imagery.on('tileload', markTileReady);
        imagery.on('load', markTileReady);
        imagery.on('tileerror', function (event) { retryTile(event, imagery, 'img', key); });
        labels.on('tileerror', function (event) { retryTile(event, labels, 'cia', key); });
        imagery.addTo(map);
        labels.addTo(map);
        imagery.bringToBack();
        tianDiTuLayers = [imagery, labels];
        tileTimeout = window.setTimeout(function () {
          if (!tileReady) showStatus('天地图影像加载超时，位置标记仍可查看');
        }, 12000);
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function sourceLabel(source) {
        if (source === 'gps-live') return '实时 GPS';
        if (source === 'gps-last') return '最后有效 GPS';
        if (source === 'station') return '站点登记位置';
        return '厦门大学默认位置';
      }

      function nodeLabel(location, index) {
        var match = String(location.locationName || '').match(/(?:节点|node)[\s_-]*([a-z])/i);
        return match ? match[1].toUpperCase() : String(index + 1);
      }

      function clearNodeMarkers() {
        nodeMarkers.forEach(function (item) { map.removeLayer(item); });
        nodeMarkers = [];
      }

      function isAlertNode(location, focusLocation, highlightAlert) {
        if (!highlightAlert || !focusLocation) return false;
        var sameDevice = location.deviceId && focusLocation.deviceId && location.deviceId === focusLocation.deviceId;
        var closeCoordinate =
          Math.abs(Number(location.latitude) - Number(focusLocation.latitude)) < 0.00005 &&
          Math.abs(Number(location.longitude) - Number(focusLocation.longitude)) < 0.00005;
        return closeCoordinate && (sameDevice || !focusLocation.deviceId);
      }

      function renderNodes(locations, focusLocation, highlightAlert) {
        clearNodeMarkers();
        var points = [];
        var alertNodeMatched = false;
        (Array.isArray(locations) ? locations : []).forEach(function (location, index) {
          var latitude = Number(location.latitude);
          var longitude = Number(location.longitude);
          if (!validCoordinate(latitude, longitude)) return;
          var label = nodeLabel(location, index);
          var alertNode = isAlertNode(location, focusLocation, highlightAlert);
          if (alertNode) alertNodeMatched = true;
          var delay = (index * 0.35).toFixed(2) + 's';
          var icon = L.divIcon({
            className: '',
            html: '<div class="node-marker' + (alertNode ? ' node-marker--alert' : '') + '" style="--node-delay:' + delay + '">' +
              '<span class="node-marker__pulse"></span><span class="node-marker__core">' + label + '</span></div>',
            iconSize: [34, 34],
            iconAnchor: [17, 17]
          });
          var nodeMarker = L.marker([latitude, longitude], {
            icon: icon,
            keyboard: false,
            zIndexOffset: 400
          }).addTo(map);
          nodeMarker.bindTooltip(
            '<strong>' + escapeHtml(location.locationName) + '</strong><br>' +
              '<span class="node-map-tooltip__source">' + sourceLabel(location.source) + '</span>',
            { className: 'node-map-tooltip', direction: 'top', offset: [0, -12], opacity: 1 }
          );
          nodeMarkers.push(nodeMarker);
          points.push([latitude, longitude]);
        });
        return { points: points, alertNodeMatched: alertNodeMatched };
      }

      function renderAlertMarker(location, visible) {
        if (!visible || !location || !validCoordinate(Number(location.latitude), Number(location.longitude))) {
          if (alertMarker) map.removeLayer(alertMarker);
          alertMarker = null;
          return null;
        }
        var position = [Number(location.latitude), Number(location.longitude)];
        if (!alertMarker) {
          var icon = L.divIcon({
            className: '',
            html: '<div class="alert-marker" aria-hidden="true"><span class="alert-marker__pulse"></span><span class="alert-marker__core"></span></div>',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
          });
          alertMarker = L.marker(position, { icon: icon, keyboard: false, zIndexOffset: 800 }).addTo(map);
        } else {
          alertMarker.setLatLng(position);
        }
        return position;
      }

      function clearGuidanceLayers() {
        if (userMarker) map.removeLayer(userMarker);
        if (safeMarker) map.removeLayer(safeMarker);
        if (guidanceLine) map.removeLayer(guidanceLine);
        userMarker = null;
        safeMarker = null;
        guidanceLine = null;
      }

      function renderGuidance(userLocation, evacuationTarget, focusLocation, highlightAlert) {
        clearGuidanceLayers();
        var viewPoints = [];
        var userPoint = null;
        var safePoint = null;
        if (userLocation && validCoordinate(Number(userLocation.latitude), Number(userLocation.longitude))) {
          userPoint = [Number(userLocation.latitude), Number(userLocation.longitude)];
          var userIcon = L.divIcon({
            className: '',
            html: '<div class="user-marker" aria-hidden="true"><span class="user-marker__ring"></span><span class="user-marker__core"></span></div>',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          });
          userMarker = L.marker(userPoint, { icon: userIcon, keyboard: false, zIndexOffset: 900 }).addTo(map);
          userMarker.bindTooltip(
            '<strong>我的位置</strong><br><span class="node-map-tooltip__source">定位精度约 ' +
              Math.max(0, Math.round(Number(userLocation.accuracy) || 0)) + ' 米</span>',
            { className: 'node-map-tooltip', direction: 'top', offset: [0, -10], opacity: 1 }
          );
        }
        if (evacuationTarget && validCoordinate(Number(evacuationTarget.latitude), Number(evacuationTarget.longitude))) {
          safePoint = [Number(evacuationTarget.latitude), Number(evacuationTarget.longitude)];
          var safeIcon = L.divIcon({
            className: '',
            html: '<div class="safe-marker" aria-hidden="true">安</div>',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
          });
          safeMarker = L.marker(safePoint, { icon: safeIcon, keyboard: false, zIndexOffset: 850 }).addTo(map);
          safeMarker.bindTooltip(
            '<strong>' + escapeHtml(evacuationTarget.name || '安全集合点') + '</strong>',
            { className: 'node-map-tooltip', direction: 'top', offset: [0, -11], opacity: 1 }
          );
        }
        var focusValid = focusLocation && focusLocation.source !== 'default' &&
          validCoordinate(Number(focusLocation.latitude), Number(focusLocation.longitude));
        if (userPoint && safePoint) {
          guidanceLine = L.polyline([userPoint, safePoint], {
            color: '#27856d', weight: 4, opacity: 0.88, dashArray: '8 8'
          }).addTo(map);
          viewPoints.push(userPoint, safePoint);
          if (focusValid) viewPoints.push([Number(focusLocation.latitude), Number(focusLocation.longitude)]);
        } else if (userPoint && focusValid && highlightAlert) {
          var alertPoint = [Number(focusLocation.latitude), Number(focusLocation.longitude)];
          guidanceLine = L.polyline([userPoint, alertPoint], {
            color: '#b44832', weight: 3, opacity: 0.72, dashArray: '7 9'
          }).addTo(map);
          viewPoints.push(userPoint, alertPoint);
        }
        return viewPoints;
      }

      function renderMapState(focusLocation, locations, highlightAlert, userLocation, evacuationTarget) {
        if (!map) return;
        statusElement.classList.remove('is-visible');
        var nodeState = renderNodes(locations, focusLocation, highlightAlert);
        var points = nodeState.points;
        renderAlertMarker(focusLocation, highlightAlert && !nodeState.alertNodeMatched);
        var guidancePoints = renderGuidance(userLocation, evacuationTarget, focusLocation, highlightAlert);
        if (guidancePoints.length > 1) {
          map.fitBounds(guidancePoints, { paddingTopLeft: [54, 76], paddingBottomRight: [54, 360], maxZoom: 16, animate: true });
        } else if (highlightAlert && focusLocation && validCoordinate(Number(focusLocation.latitude), Number(focusLocation.longitude))) {
          map.flyTo([Number(focusLocation.latitude), Number(focusLocation.longitude)], 14, { animate: true, duration: 0.7 });
        } else if (points.length === 1) {
          map.flyTo(points[0], 14, { animate: true, duration: 0.7 });
        } else if (points.length > 1) {
          map.fitBounds(points, { padding: [42, 42], maxZoom: 15, animate: true });
        } else if (focusLocation && validCoordinate(Number(focusLocation.latitude), Number(focusLocation.longitude))) {
          map.flyTo([Number(focusLocation.latitude), Number(focusLocation.longitude)], 14, { animate: true, duration: 0.7 });
        }
      }

      window.renderMapState = function (focusLocation, locations, highlightAlert, userLocation, evacuationTarget, refreshTiles) {
        pendingMapState = {
          focusLocation: focusLocation,
          locations: Array.isArray(locations) ? locations : [],
          highlightAlert: Boolean(highlightAlert),
          userLocation: userLocation,
          evacuationTarget: evacuationTarget
        };
        renderMapState(pendingMapState.focusLocation, pendingMapState.locations, pendingMapState.highlightAlert,
          pendingMapState.userLocation, pendingMapState.evacuationTarget);
        if (refreshTiles && map && !tileReady) loadTianDiTu(pendingTianDiTuKey);
      };

      window.configureTianDiTu = function (key) {
        pendingTianDiTuKey = typeof key === 'string' ? key.trim() : '';
        if (map) loadTianDiTu(pendingTianDiTuKey);
      };

      function initialise() {
        if (typeof L === 'undefined') {
          showStatus('地图组件加载失败，位置标记仍可查看');
          return;
        }

        map = L.map('map', {
          zoomControl: false,
          attributionControl: false,
          minZoom: 3,
          maxZoom: 18,
          preferCanvas: true
        });
        L.DomEvent.disableClickPropagation(zoomElement);
        L.DomEvent.disableScrollPropagation(zoomElement);
        document.getElementById('zoom-in').addEventListener('click', function () { map.zoomIn(); });
        document.getElementById('zoom-out').addEventListener('click', function () { map.zoomOut(); });

        if (pendingMapState) {
          renderMapState(pendingMapState.focusLocation, pendingMapState.locations, pendingMapState.highlightAlert,
            pendingMapState.userLocation, pendingMapState.evacuationTarget);
        } else {
          map.setView([24.43803, 118.09631], 14);
        }
        if (pendingTianDiTuKey) loadTianDiTu(pendingTianDiTuKey);
      }

      window.addEventListener('load', initialise, { once: true });
    }());
  </script>
</body>
</html>
