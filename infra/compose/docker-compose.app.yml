# Full stack composition (adds app services on top of infra/compose/docker-compose.yml)
#
# Usage:
# - Copy env: `copy infra/compose/env.example infra/compose/.env` (then edit secrets)
# - Start: `docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.app.yml --env-file infra/compose/.env up -d`

services:
  # Attach schema init scripts (only runs automatically on first init when the data dir is empty).
  postgres:
    volumes:
      - ../../docs/integrations/storage/postgres/tables:/docker-entrypoint-initdb.d:ro

  # ClickHouse image supports init scripts in /docker-entrypoint-initdb.d (safe here thanks to IF NOT EXISTS).
  clickhouse:
    volumes:
      - ../../docs/integrations/storage/clickhouse:/docker-entrypoint-initdb.d:ro

  api:
    image: lsmv2/api-service:latest
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: lsmv2_api
    restart: unless-stopped
    environment:
      SERVICE_NAME: api-service
      API_HOST: 0.0.0.0
      API_PORT: 8080

      # Security (set in infra/compose/.env)
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      DB_ADMIN_ENABLED: ${DB_ADMIN_ENABLED:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-}

      # Postgres (inside compose network)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
      POSTGRES_USER: ${PG_USER:-landslide}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${PG_DATABASE:-landslide_monitor}

      # ClickHouse (inside compose network)
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USERNAME: ${CH_USER:-landslide}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-change-me}
      CLICKHOUSE_DATABASE: ${CH_DATABASE:-landslide}

      # Optional integrations
      # App containers must use the compose-network broker address, not host-loopback localhost:9094.
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      MQTT_INTERNAL_USERNAME: ${MQTT_INTERNAL_USERNAME:-ingest-service}
      MQTT_INTERNAL_PASSWORD: ${MQTT_INTERNAL_PASSWORD:-}
      EMQX_WEBHOOK_TOKEN: ${EMQX_WEBHOOK_TOKEN:-}
      RK3568_ALARM_ACTUATOR_URL: ${RK3568_ALARM_ACTUATOR_URL:-http://tongxiao-alarm-bridge:18088}
      RK3568_FIELD_LINK_MONITOR_URL: ${RK3568_FIELD_LINK_MONITOR_URL:-}
      RK3568_HERMES_EDGE_SUPERVISOR_URL: ${RK3568_HERMES_EDGE_SUPERVISOR_URL:-}
      RK3568_STATUS_HTTP_TIMEOUT_MS: ${RK3568_STATUS_HTTP_TIMEOUT_MS:-6000}
    volumes:
      # Expose the latest RK3568/Hermes evidence artifacts to the API runtime.
      # The API reads these files on demand for the desktop System Monitor.
      - ../../docs/unified/reports:/repo/docs/unified/reports:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      tongxiao-alarm-bridge:
        condition: service_started

  web:
    profiles: ["legacy-web"]
    image: lsmv2/web:latest
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: lsmv2_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      # Next server-side proxy target (apps/web/app/api/*).
      API_BASE_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  ingest:
    image: lsmv2/ingest-service:latest
    build:
      context: ../..
      dockerfile: services/ingest/Dockerfile
    container_name: lsmv2_ingest
    restart: unless-stopped
    environment:
      SERVICE_NAME: ingest-service
      MQTT_URL: mqtt://emqx:1883
      MQTT_USERNAME: ${MQTT_INTERNAL_USERNAME:-ingest-service}
      MQTT_PASSWORD: ${MQTT_INTERNAL_PASSWORD:-}
      MQTT_TOPIC_TELEMETRY: telemetry/+
      MQTT_TOPIC_PRESENCE: presence/+
      MESSAGE_MAX_BYTES: ${INGEST_MESSAGE_MAX_BYTES:-262144}
      METRICS_MAX_KEYS: ${INGEST_METRICS_MAX_KEYS:-500}
      DLQ_RAW_PAYLOAD_MAX_BYTES: ${INGEST_DLQ_RAW_PAYLOAD_MAX_BYTES:-65536}
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      KAFKA_CLIENT_ID: ingest-service
      KAFKA_TOPIC_TELEMETRY_RAW: telemetry.raw.v1
      KAFKA_TOPIC_TELEMETRY_DLQ: telemetry.dlq.v1
      KAFKA_TOPIC_PRESENCE_EVENTS: presence.events.v1
    depends_on:
      emqx:
        condition: service_started
      kafka:
        condition: service_healthy

  telemetry-writer:
    image: lsmv2/telemetry-writer:latest
    build:
      context: ../..
      dockerfile: services/telemetry-writer/Dockerfile
    container_name: lsmv2_telemetry_writer
    restart: unless-stopped
    environment:
      SERVICE_NAME: telemetry-writer
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      KAFKA_CLIENT_ID: telemetry-writer
      KAFKA_GROUP_ID: telemetry-writer.v1
      KAFKA_TOPIC_TELEMETRY_RAW: telemetry.raw.v1
      KAFKA_TOPIC_TELEMETRY_DLQ: telemetry.dlq.v1
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USERNAME: ${CH_USER:-landslide}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-change-me}
      CLICKHOUSE_DATABASE: ${CH_DATABASE:-landslide}
      CLICKHOUSE_TABLE: telemetry_raw
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
      POSTGRES_USER: ${PG_USER:-landslide}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${PG_DATABASE:-landslide_monitor}
      POSTGRES_POOL_MAX: ${WRITER_POSTGRES_POOL_MAX:-5}
      BATCH_MAX_ROWS: ${WRITER_BATCH_MAX_ROWS:-2000}
      BATCH_MAX_MESSAGES: ${WRITER_BATCH_MAX_MESSAGES:-500}
      BATCH_FLUSH_INTERVAL_MS: ${WRITER_BATCH_FLUSH_INTERVAL_MS:-1000}
      MESSAGE_MAX_BYTES: ${WRITER_MESSAGE_MAX_BYTES:-262144}
      HIGH_FREQUENCY_BUDGET_BYTES: ${WRITER_HIGH_FREQUENCY_BUDGET_BYTES:-192}
      DLQ_RAW_PAYLOAD_MAX_BYTES: ${WRITER_DLQ_RAW_PAYLOAD_MAX_BYTES:-65536}
      STATS_LOG_INTERVAL_MS: ${WRITER_STATS_LOG_INTERVAL_MS:-30000}
      CLICKHOUSE_UNAVAILABLE_COOLDOWN_MS: ${WRITER_CLICKHOUSE_UNAVAILABLE_COOLDOWN_MS:-15000}
      CLICKHOUSE_UNAVAILABLE_COOLDOWN_MAX_MS: ${WRITER_CLICKHOUSE_UNAVAILABLE_COOLDOWN_MAX_MS:-300000}
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy

  tongxiao-alarm-bridge:
    image: lsmv2/tongxiao-alarm-bridge:latest
    build:
      context: ../..
      dockerfile: services/tongxiao-alarm-bridge/Dockerfile
    container_name: lsmv2_tongxiao_alarm_bridge
    restart: unless-stopped
    environment:
      SERVICE_NAME: tongxiao-alarm-bridge
      ALARM_BRIDGE_HOST: 0.0.0.0
      ALARM_BRIDGE_PORT: 18088
      TONGXIAO_DEVICE_ID: ${TONGXIAO_DEVICE_ID:-00000000-0000-4000-8000-000000022206}
      TONGXIAO_VOICE_ENABLED: ${TONGXIAO_VOICE_ENABLED:-false}
      TONGXIAO_PRESENCE_STALE_SECONDS: ${TONGXIAO_PRESENCE_STALE_SECONDS:-90}
      MQTT_URL: mqtt://emqx:1883
      MQTT_USERNAME: ${MQTT_INTERNAL_USERNAME:-ingest-service}
      MQTT_PASSWORD: ${MQTT_INTERNAL_PASSWORD:-}
      MQTT_ALARM_DESIRED_PREFIX: alarm/desired/
      MQTT_ALARM_REPORTED_PREFIX: alarm/reported/
      MQTT_PRESENCE_PREFIX: presence/
    depends_on:
      emqx:
        condition: service_started

  rule-engine-worker:
    image: lsmv2/rule-engine-worker:latest
    build:
      context: ../..
      dockerfile: services/rule-engine-worker/Dockerfile
    container_name: lsmv2_rule_engine_worker
    restart: unless-stopped
    environment:
      SERVICE_NAME: rule-engine-worker
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      KAFKA_CLIENT_ID: rule-engine-worker
      KAFKA_GROUP_ID: rule-engine-worker.v1
      KAFKA_TOPIC_TELEMETRY_RAW: telemetry.raw.v1
      KAFKA_TOPIC_ALERTS_EVENTS: alerts.events.v1
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
      POSTGRES_USER: ${PG_USER:-landslide}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${PG_DATABASE:-landslide_monitor}
      POSTGRES_POOL_MAX: ${RULE_ENGINE_POSTGRES_POOL_MAX:-5}
      RULES_REFRESH_MS: ${RULES_REFRESH_MS:-2000}
      MAX_POINTS_PER_RULE: ${RULE_ENGINE_MAX_POINTS_PER_RULE:-600}
      RK3568_ALARM_ACTUATOR_URL: ${RK3568_ALARM_ACTUATOR_URL:-http://tongxiao-alarm-bridge:18088}
      ACTUATOR_TIMEOUT_MS: ${RULE_ENGINE_ACTUATOR_TIMEOUT_MS:-5000}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      tongxiao-alarm-bridge:
        condition: service_started

  command-dispatcher:
    image: lsmv2/command-dispatcher:latest
    build:
      context: ../..
      dockerfile: services/command-dispatcher/Dockerfile
    container_name: lsmv2_command_dispatcher
    restart: unless-stopped
    environment:
      SERVICE_NAME: command-dispatcher
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      KAFKA_CLIENT_ID: command-dispatcher
      KAFKA_GROUP_ID: command-dispatcher.v1
      KAFKA_TOPIC_DEVICE_COMMANDS: device.commands.v1
      MQTT_URL: mqtt://emqx:1883
      MQTT_USERNAME: ${MQTT_INTERNAL_USERNAME:-ingest-service}
      MQTT_PASSWORD: ${MQTT_INTERNAL_PASSWORD:-}
      MQTT_TOPIC_COMMAND_PREFIX: cmd/
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
      POSTGRES_USER: ${PG_USER:-landslide}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${PG_DATABASE:-landslide_monitor}
      POSTGRES_POOL_MAX: ${COMMAND_POSTGRES_POOL_MAX:-5}
    depends_on:
      emqx:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  command-ack-receiver:
    image: lsmv2/command-ack-receiver:latest
    build:
      context: ../..
      dockerfile: services/command-ack-receiver/Dockerfile
    container_name: lsmv2_command_ack_receiver
    restart: unless-stopped
    environment:
      SERVICE_NAME: command-ack-receiver
      MQTT_URL: mqtt://emqx:1883
      MQTT_USERNAME: ${MQTT_INTERNAL_USERNAME:-ingest-service}
      MQTT_PASSWORD: ${MQTT_INTERNAL_PASSWORD:-}
      MQTT_TOPIC_ACK_PREFIX: cmd_ack/
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      KAFKA_CLIENT_ID: command-ack-receiver
      KAFKA_GROUP_ID: command-ack-receiver.v1
      KAFKA_TOPIC_DEVICE_COMMAND_ACKS: device.command_acks.v1
      KAFKA_TOPIC_DEVICE_COMMAND_EVENTS: device.command_events.v1
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
      POSTGRES_USER: ${PG_USER:-landslide}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${PG_DATABASE:-landslide_monitor}
      POSTGRES_POOL_MAX: ${COMMAND_POSTGRES_POOL_MAX:-5}
    depends_on:
      emqx:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  command-events-recorder:
    image: lsmv2/command-events-recorder:latest
    build:
      context: ../..
      dockerfile: services/command-events-recorder/Dockerfile
    container_name: lsmv2_command_events_recorder
    restart: unless-stopped
    environment:
      SERVICE_NAME: command-events-recorder
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      KAFKA_CLIENT_ID: command-events-recorder
      KAFKA_GROUP_ID: command-events-recorder.v1
      KAFKA_TOPIC_DEVICE_COMMAND_EVENTS: device.command_events.v1
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
      POSTGRES_USER: ${PG_USER:-landslide}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${PG_DATABASE:-landslide_monitor}
      POSTGRES_POOL_MAX: ${COMMAND_POSTGRES_POOL_MAX:-5}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  command-timeout-worker:
    image: lsmv2/command-timeout-worker:latest
    build:
      context: ../..
      dockerfile: services/command-timeout-worker/Dockerfile
    container_name: lsmv2_command_timeout_worker
    restart: unless-stopped
    environment:
      SERVICE_NAME: command-timeout-worker
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      KAFKA_CLIENT_ID: command-timeout-worker
      KAFKA_TOPIC_DEVICE_COMMAND_EVENTS: device.command_events.v1
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
      POSTGRES_USER: ${PG_USER:-landslide}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${PG_DATABASE:-landslide_monitor}
      POSTGRES_POOL_MAX: ${COMMAND_POSTGRES_POOL_MAX:-5}
      COMMAND_ACK_TIMEOUT_SECONDS: ${COMMAND_ACK_TIMEOUT_SECONDS:-60}
      SCAN_INTERVAL_MS: ${COMMAND_TIMEOUT_SCAN_INTERVAL_MS:-5000}
      SCAN_LIMIT: ${COMMAND_TIMEOUT_SCAN_LIMIT:-200}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
