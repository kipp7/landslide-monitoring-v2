# Full stack composition (adds app services on top of infra/compose/docker-compose.yml)
#
# Usage:
# - Copy env: `copy infra/compose/env.example infra/compose/.env` (then edit secrets)
# - Start: `docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.app.yml --env-file infra/compose/.env up -d`

services:
  # Attach schema init scripts (only runs automatically on first init when the data dir is empty).
  postgres:
    volumes:
      - ../../docs/integrations/storage/postgres/tables:/docker-entrypoint-initdb.d:ro

  # ClickHouse image supports init scripts in /docker-entrypoint-initdb.d (safe here thanks to IF NOT EXISTS).
  clickhouse:
    volumes:
      - ../../docs/integrations/storage/clickhouse:/docker-entrypoint-initdb.d:ro

  api:
    image: lsmv2/api-service:latest
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: lsmv2_api
    restart: unless-stopped
    environment:
      SERVICE_NAME: api-service
      API_HOST: 0.0.0.0
      API_PORT: 8080

      # Security (set in infra/compose/.env)
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      DB_ADMIN_ENABLED: ${DB_ADMIN_ENABLED:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-}

      # Postgres (inside compose network)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
      POSTGRES_USER: ${PG_USER:-landslide}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${PG_DATABASE:-landslide_monitor}

      # ClickHouse (inside compose network)
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USERNAME: ${CH_USER:-landslide}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-change-me}
      CLICKHOUSE_DATABASE: ${CH_DATABASE:-landslide}

      # Optional integrations
      # App containers must use the compose-network broker address, not host-loopback localhost:9094.
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      MQTT_INTERNAL_USERNAME: ${MQTT_INTERNAL_USERNAME:-ingest-service}
      MQTT_INTERNAL_PASSWORD: ${MQTT_INTERNAL_PASSWORD:-}
      EMQX_WEBHOOK_TOKEN: ${EMQX_WEBHOOK_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  web:
    image: lsmv2/web:latest
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: lsmv2_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      # Next server-side proxy target (apps/web/app/api/*).
      API_BASE_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  ingest:
    image: lsmv2/ingest-service:latest
    build:
      context: ../..
      dockerfile: services/ingest/Dockerfile
    container_name: lsmv2_ingest
    restart: unless-stopped
    environment:
      SERVICE_NAME: ingest-service
      MQTT_URL: mqtt://emqx:1883
      MQTT_USERNAME: ${MQTT_INTERNAL_USERNAME:-ingest-service}
      MQTT_PASSWORD: ${MQTT_INTERNAL_PASSWORD:-}
      MQTT_TOPIC_TELEMETRY: telemetry/+
      MQTT_TOPIC_PRESENCE: presence/+
      MESSAGE_MAX_BYTES: ${INGEST_MESSAGE_MAX_BYTES:-262144}
      METRICS_MAX_KEYS: ${INGEST_METRICS_MAX_KEYS:-500}
      DLQ_RAW_PAYLOAD_MAX_BYTES: ${INGEST_DLQ_RAW_PAYLOAD_MAX_BYTES:-65536}
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      KAFKA_CLIENT_ID: ingest-service
      KAFKA_TOPIC_TELEMETRY_RAW: telemetry.raw.v1
      KAFKA_TOPIC_TELEMETRY_DLQ: telemetry.dlq.v1
      KAFKA_TOPIC_PRESENCE_EVENTS: presence.events.v1
    depends_on:
      emqx:
        condition: service_started
      kafka:
        condition: service_healthy

  telemetry-writer:
    image: lsmv2/telemetry-writer:latest
    build:
      context: ../..
      dockerfile: services/telemetry-writer/Dockerfile
    container_name: lsmv2_telemetry_writer
    restart: unless-stopped
    environment:
      SERVICE_NAME: telemetry-writer
      KAFKA_BROKERS: ${KAFKA_BROKERS_INTERNAL:-kafka:9092}
      KAFKA_CLIENT_ID: telemetry-writer
      KAFKA_GROUP_ID: telemetry-writer.v1
      KAFKA_TOPIC_TELEMETRY_RAW: telemetry.raw.v1
      KAFKA_TOPIC_TELEMETRY_DLQ: telemetry.dlq.v1
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USERNAME: ${CH_USER:-landslide}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-change-me}
      CLICKHOUSE_DATABASE: ${CH_DATABASE:-landslide}
      CLICKHOUSE_TABLE: telemetry_raw
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${PG_PORT:-5432}
      POSTGRES_USER: ${PG_USER:-landslide}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-change-me}
      POSTGRES_DATABASE: ${PG_DATABASE:-landslide_monitor}
      POSTGRES_POOL_MAX: ${WRITER_POSTGRES_POOL_MAX:-5}
      BATCH_MAX_ROWS: ${WRITER_BATCH_MAX_ROWS:-2000}
      BATCH_MAX_MESSAGES: ${WRITER_BATCH_MAX_MESSAGES:-500}
      BATCH_FLUSH_INTERVAL_MS: ${WRITER_BATCH_FLUSH_INTERVAL_MS:-1000}
      MESSAGE_MAX_BYTES: ${WRITER_MESSAGE_MAX_BYTES:-262144}
      HIGH_FREQUENCY_BUDGET_BYTES: ${WRITER_HIGH_FREQUENCY_BUDGET_BYTES:-192}
      DLQ_RAW_PAYLOAD_MAX_BYTES: ${WRITER_DLQ_RAW_PAYLOAD_MAX_BYTES:-65536}
      STATS_LOG_INTERVAL_MS: ${WRITER_STATS_LOG_INTERVAL_MS:-30000}
      CLICKHOUSE_UNAVAILABLE_COOLDOWN_MS: ${WRITER_CLICKHOUSE_UNAVAILABLE_COOLDOWN_MS:-15000}
      CLICKHOUSE_UNAVAILABLE_COOLDOWN_MAX_MS: ${WRITER_CLICKHOUSE_UNAVAILABLE_COOLDOWN_MAX_MS:-300000}
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
